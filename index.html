<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Summarizer</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .result-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .result-card:hover { transform: translateY(-3px) !important; box-shadow: 0 8px 24px rgba(0,0,0,0.11) !important; }
    textarea:focus { border-color: #3B5BDB !important; }
    ::placeholder { color: #B0B8C8; }
    a { color: #3B5BDB; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const CATEGORIES = [
      { key: "methodology",  label: "Methodology",        icon: "⚙️", color: "#3B5BDB", bg: "#EEF2FF" },
      { key: "limitations",  label: "Limitations",        icon: "⚠️", color: "#E8590C", bg: "#FFF4EC" },
      { key: "future_work",  label: "Future Work",        icon: "🔭", color: "#7048E8", bg: "#F3F0FF" },
      { key: "year",         label: "Year",               icon: "📅", color: "#0CA678", bg: "#EDFBF3" },
      { key: "accuracy",     label: "Accuracy / Results", icon: "🎯", color: "#C0860A", bg: "#FFF9E6" },
      { key: "dataset",      label: "Dataset",            icon: "🗄️", color: "#1098AD", bg: "#E3FAFC" },
    ];

    const SYSTEM_PROMPT = `You are an expert academic paper analyzer. Extract structured information from the paper and return ONLY a valid JSON object with these exact keys — no markdown fences, no preamble, no explanation:
{
  "methodology": "2–5 sentence description of the research methodology, approach, models, or techniques used.",
  "limitations": "2–4 key limitations, each on its own line starting with • ",
  "future_work": "2–4 future directions mentioned by the authors, each on its own line starting with • . If none mentioned write: Not specified in the paper.",
  "year": "4-digit publication year (e.g. 2023). If not found write: Not specified.",
  "accuracy": "All performance metrics, accuracy figures, F1/BLEU/ROUGE scores, or benchmark results reported. If not applicable write: Not reported.",
  "dataset": "All datasets used for training, validation, or evaluation with sizes if mentioned. If not specified write: Not specified."
}`;

    function App() {
      const [apiKey, setApiKey]         = useState(() => localStorage.getItem("paper_api_key") || "");
      const [showKey, setShowKey]       = useState(() => !localStorage.getItem("paper_api_key"));
      const [keyInput, setKeyInput]     = useState(() => localStorage.getItem("paper_api_key") || "");
      const [text, setText]             = useState("");
      const [pdfData, setPdfData]       = useState(null);
      const [pdfName, setPdfName]       = useState("");
      const [loading, setLoading]       = useState(false);
      const [results, setResults]       = useState(null);
      const [error, setError]           = useState("");
      const [dragOver, setDragOver]     = useState(false);
      const [copied, setCopied]         = useState(false);
      const fileInputRef = useRef(null);

      /* ── API Key ── */
      const saveKey = () => {
        const k = keyInput.trim();
        if (!k) { setError("Please paste your API key."); return; }
        localStorage.setItem("paper_api_key", k);
        setApiKey(k);
        setShowKey(false);
        setError("");
      };

      const forgetKey = () => {
        localStorage.removeItem("paper_api_key");
        setApiKey(""); setKeyInput(""); setShowKey(true);
      };

      /* ── File upload ── */
      const handleFile = (file) => {
        if (!file) return;
        if (file.type !== "application/pdf") { setError("Only PDF files are supported."); return; }
        setError(""); setPdfName(file.name); setText(""); setResults(null);
        const reader = new FileReader();
        reader.onload = () => setPdfData(reader.result.split(",")[1]);
        reader.readAsDataURL(file);
      };

      const handleDrop = (e) => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); };

      /* ── Clear ── */
      const clearAll = () => {
        setText(""); setPdfData(null); setPdfName("");
        setResults(null); setError("");
        if (fileInputRef.current) fileInputRef.current.value = "";
      };

      /* ── Summarize ── */
      const summarize = async () => {
        if (!text.trim() && !pdfData) { setError("Please paste paper text or upload a PDF."); return; }
        const key = localStorage.getItem("paper_api_key");
        if (!key) { setShowKey(true); setError("Enter your Anthropic API key first."); return; }

        setLoading(true); setError(""); setResults(null);

        try {
          const messages = pdfData
            ? [{ role: "user", content: [
                { type: "document", source: { type: "base64", media_type: "application/pdf", data: pdfData } },
                { type: "text", text: "Analyze this research paper and return the JSON summary." }
              ]}]
            : [{ role: "user", content: `Analyze this research paper:\n\n${text}` }];

          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": key,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1200, system: SYSTEM_PROMPT, messages }),
          });

          const data = await res.json();
          if (data.error) throw new Error(data.error.message);

          const raw = data.content.map(i => i.text || "").join("").replace(/```json|```/g, "").trim();
          setResults(JSON.parse(raw));
        } catch (err) {
          setError("Analysis failed: " + err.message);
        } finally {
          setLoading(false);
        }
      };

      /* ── Copy ── */
      const copyResults = () => {
        const out = CATEGORIES.map(c => `${c.label.toUpperCase()}\n${results[c.key]}`).join("\n\n");
        navigator.clipboard.writeText(out);
        setCopied(true); setTimeout(() => setCopied(false), 2500);
      };

      const hasInput = text.trim() || pdfData;

      /* ── Render ── */
      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#F0F4FF 0%,#F8F0FF 100%)", padding:"36px 16px 60px" }}>
          <div style={{ maxWidth:800, margin:"0 auto" }}>

            {/* ── HEADER ── */}
            <div style={{ textAlign:"center", marginBottom:32 }}>
              <div style={{ fontSize:48, marginBottom:10 }}>📄</div>
              <h1 style={{ fontSize:30, fontWeight:900, color:"#1A1B2E", letterSpacing:"-0.6px", marginBottom:7 }}>
                Paper Summarizer
              </h1>
              <p style={{ color:"#6B7280", fontSize:15 }}>
                Extract key insights from any research paper — instantly.
              </p>
            </div>

            {/* ── API KEY ── */}
            <div style={{
              background:"#fff", borderRadius:14, padding:"18px 22px", marginBottom:16,
              boxShadow:"0 2px 16px rgba(59,91,219,0.08)",
              border: showKey ? "1.5px solid #3B5BDB" : "1.5px solid #E5E7EB"
            }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <span style={{ fontWeight:700, fontSize:14, color: apiKey ? "#0CA678" : "#374151" }}>
                  {apiKey ? "✅ API Key configured" : "🔑 Anthropic API Key required"}
                </span>
                <div style={{ display:"flex", gap:8 }}>
                  {apiKey && (
                    <button onClick={forgetKey} style={{ background:"none", border:"none", color:"#E8590C", cursor:"pointer", fontSize:12, fontWeight:600 }}>
                      Remove
                    </button>
                  )}
                  <button onClick={() => setShowKey(v => !v)} style={{ background:"none", border:"none", color:"#3B5BDB", cursor:"pointer", fontSize:13, fontWeight:600 }}>
                    {showKey ? "▲ Hide" : "▼ Change"}
                  </button>
                </div>
              </div>

              {showKey && (
                <div style={{ marginTop:14, animation:"fadeIn 0.2s ease" }}>
                  <p style={{ fontSize:13, color:"#6B7280", marginBottom:10, lineHeight:1.6 }}>
                    Get your free key from{" "}
                    <a href="https://console.anthropic.com/keys" target="_blank" rel="noopener">console.anthropic.com/keys</a>.{" "}
                    It's saved only in <em>your</em> browser — never sent anywhere except Anthropic.
                  </p>
                  <div style={{ display:"flex", gap:10 }}>
                    <input
                      type="password"
                      value={keyInput}
                      onChange={e => setKeyInput(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && saveKey()}
                      placeholder="sk-ant-api03-…"
                      style={{
                        flex:1, border:"1.5px solid #E5E7EB", borderRadius:8,
                        padding:"10px 14px", fontSize:14, outline:"none",
                        fontFamily:"monospace", color:"#374151", background:"#FAFAFA"
                      }}
                    />
                    <button onClick={saveKey} style={{
                      background:"#3B5BDB", color:"#fff", border:"none",
                      borderRadius:8, padding:"10px 20px", fontWeight:700,
                      fontSize:14, cursor:"pointer", whiteSpace:"nowrap"
                    }}>
                      Save Key
                    </button>
                  </div>
                </div>
              )}
            </div>

            {/* ── INPUT CARD ── */}
            <div style={{ background:"#fff", borderRadius:16, padding:28, boxShadow:"0 2px 20px rgba(59,91,219,0.08)", marginBottom:20 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                <span style={{ fontWeight:700, color:"#1A1B2E", fontSize:15 }}>
                  {pdfData ? "📎 PDF Uploaded" : "Paste Paper Text"}
                </span>
                {(hasInput || results) && (
                  <button onClick={clearAll} style={{ border:"none", background:"none", color:"#9CA3AF", cursor:"pointer", fontSize:13 }}>
                    ✕ Clear all
                  </button>
                )}
              </div>

              {pdfData ? (
                <div style={{ padding:"18px 20px", background:"#F3F0FF", borderRadius:10, display:"flex", alignItems:"center", gap:12, border:"1.5px solid #C4B5FD" }}>
                  <span style={{ fontSize:30 }}>📄</span>
                  <div>
                    <div style={{ fontWeight:600, color:"#4C1D95", fontSize:14 }}>{pdfName}</div>
                    <div style={{ fontSize:12, color:"#7C3AED", marginTop:2 }}>Ready to analyze</div>
                  </div>
                </div>
              ) : (
                <textarea
                  value={text}
                  onChange={e => { setText(e.target.value); setError(""); setResults(null); }}
                  placeholder="Paste the full text of your research paper here…"
                  rows={9}
                  style={{
                    width:"100%", border:"1.5px solid #E5E7EB", borderRadius:10,
                    padding:"14px 16px", fontSize:14, lineHeight:1.7,
                    color:"#374151", resize:"vertical", outline:"none",
                    fontFamily:"inherit", background:"#FAFAFA", transition:"border-color 0.15s"
                  }}
                />
              )}

              {/* Drop zone */}
              {!pdfData && (
                <div
                  onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                  onDragLeave={() => setDragOver(false)}
                  onDrop={handleDrop}
                  onClick={() => fileInputRef.current?.click()}
                  style={{
                    marginTop:12, border:`2px dashed ${dragOver ? "#3B5BDB" : "#D1D5DB"}`,
                    borderRadius:10, padding:"15px", textAlign:"center", cursor:"pointer",
                    background: dragOver ? "#EEF2FF" : "#F9FAFB",
                    color: dragOver ? "#3B5BDB" : "#9CA3AF", fontSize:13,
                    transition:"all 0.15s"
                  }}
                >
                  <span style={{ fontSize:20 }}>📎</span>{" "}
                  Or <strong>drag & drop a PDF</strong> here, or{" "}
                  <span style={{ color:"#3B5BDB", textDecoration:"underline" }}>browse files</span>
                  <input ref={fileInputRef} type="file" accept="application/pdf" style={{ display:"none" }}
                    onChange={e => handleFile(e.target.files[0])} />
                </div>
              )}

              {/* Error */}
              {error && (
                <div style={{ marginTop:12, padding:"10px 14px", background:"#FFF1F0", border:"1px solid #FECACA", borderRadius:8, color:"#C0280A", fontSize:13 }}>
                  ⚠️ {error}
                </div>
              )}

              {/* Submit */}
              <button
                onClick={summarize}
                disabled={loading || !hasInput}
                style={{
                  marginTop:16, width:"100%", padding:"14px",
                  background: hasInput && !loading ? "linear-gradient(135deg,#3B5BDB,#7048E8)" : "#E5E7EB",
                  color: hasInput && !loading ? "#fff" : "#9CA3AF",
                  border:"none", borderRadius:10, fontWeight:700, fontSize:15,
                  cursor: hasInput && !loading ? "pointer" : "not-allowed",
                  transition:"opacity 0.15s", letterSpacing:"0.2px"
                }}
              >
                {loading ? "⏳  Analyzing paper…" : "✨  Summarize Paper"}
              </button>
            </div>

            {/* ── LOADING ── */}
            {loading && (
              <div style={{ textAlign:"center", padding:"28px 0", color:"#6B7280", fontSize:14 }}>
                <div style={{
                  display:"inline-block", width:38, height:38,
                  border:"3px solid #E5E7EB", borderTop:"3px solid #3B5BDB",
                  borderRadius:"50%", animation:"spin 0.8s linear infinite", marginBottom:14
                }} />
                <p>Reading your paper and extracting insights…</p>
              </div>
            )}

            {/* ── RESULTS ── */}
            {results && (
              <div style={{ animation:"fadeIn 0.35s ease" }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:18 }}>
                  <div style={{ flex:1, height:1, background:"#E5E7EB" }} />
                  <span style={{ fontWeight:700, color:"#1A1B2E", fontSize:14, whiteSpace:"nowrap" }}>
                    📊 Summary Results
                  </span>
                  <div style={{ flex:1, height:1, background:"#E5E7EB" }} />
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))", gap:16 }}>
                  {CATEGORIES.map(cat => (
                    <div key={cat.key} className="result-card" style={{
                      background:"#fff", borderRadius:14, padding:"20px 22px",
                      boxShadow:"0 2px 12px rgba(0,0,0,0.06)",
                      borderLeft:`4px solid ${cat.color}`
                    }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                        <span style={{
                          background:cat.bg, borderRadius:8, width:34, height:34,
                          display:"flex", alignItems:"center", justifyContent:"center",
                          fontSize:17, flexShrink:0
                        }}>
                          {cat.icon}
                        </span>
                        <span style={{ fontWeight:700, fontSize:12, color:cat.color, textTransform:"uppercase", letterSpacing:"0.8px" }}>
                          {cat.label}
                        </span>
                      </div>
                      <div style={{ color:"#374151", fontSize:14, lineHeight:1.75 }}>
                        {(results[cat.key] || "Not found.").split("\n").filter(Boolean).map((line, i) => (
                          <p key={i} style={{ margin:"0 0 4px" }}>{line}</p>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                <button onClick={copyResults} style={{
                  marginTop:20, display:"block", width:"100%", padding:12,
                  background:"transparent", border:`1.5px solid ${copied ? "#0CA678" : "#D1D5DB"}`,
                  borderRadius:10, fontWeight:600, fontSize:14,
                  color: copied ? "#0CA678" : "#6B7280",
                  cursor:"pointer", transition:"all 0.15s"
                }}>
                  {copied ? "✅ Copied to clipboard!" : "📋 Copy Summary to Clipboard"}
                </button>
              </div>
            )}

            {/* ── FOOTER ── */}
            <p style={{ textAlign:"center", marginTop:48, fontSize:12, color:"#C0C8D8" }}>
              Powered by Claude · Your API key is stored locally in your browser only
            </p>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
